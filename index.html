<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carson SMP Games</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <div class="left">
    <div class="logo">CARSON SMP GAMES</div>

    <div class="nav">
      <a href="/games/featured/">FEATURED</a>
      <a href="/games/recents/">RECENTS</a>
      <a href="/games/allgames/">ALL</a>
    </div>

  </div>

  <div class="right">
    <input id="search" placeholder="Search games...">
  </div>

</div>

<!-- CAROUSEL -->
<div class="carousel" id="carousel">

  <a class="slide active" href="play.html?g=game1">
    <img src="assets/testimage.png">
    <div class="text">Game One (NEW)</div>
  </a>

  <a class="slide" href="play.html?g=game2">
    <img src="assets/testimage.png">
    <div class="text">Game Two</div>
  </a>

  <a class="slide" href="play.html?g=game3">
    <img src="assets/testimage.png">
    <div class="text">Game Three</div>
  </a>

</div>

<!-- FEATURED -->
<div id="featured" class="section-title">Featured Games</div>

<div class="featured">

  <a class="featured-card" href="play.html?g=game1" data-name="Game One">
    <img src="assets/testimage.png">
    <div>Game One (NEW)</div>
  </a>

  <a class="featured-card" href="play.html?g=game2" data-name="Game Two">
    <img src="assets/testimage.png">
    <div>Game Two</div>
  </a>

</div>

<!-- ALL GAMES -->
<div id="games" class="section-title">All Games</div>

<div class="grid">

  <a class="game" href="play.html?g=game1" data-name="Game One">
    <img src="assets/testimage.png">
    <div>Game One</div>
  </a>

  <a class="game" href="play.html?g=game2" data-name="Game Two">
    <img src="assets/testimage.png">
    <div>Game Two</div>
  </a>

  <a class="game" href="play.html?g=game3" data-name="Game Three">
    <img src="assets/testimage.png">
    <div>Game Three</div>
  </a>

  <a class="game" href="play.html?g=game4" data-name="Game Four">
    <img src="assets/testimage.png">
    <div>Game Four</div>
  </a>

</div>

<script>
/* =======================
   SEARCH (STEAM STYLE FILTER MODE)
======================= */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase().trim();

  const carousel = document.getElementById("carousel");
  const featured = document.getElementById("featured");

  const games = document.querySelectorAll(".game");
  const featuredCards = document.querySelectorAll(".featured-card");

  if (val === "") {
    // RESET VIEW
    carousel.style.display = "block";
    featured.style.display = "block";

    games.forEach(g => g.style.display = "block");
    featuredCards.forEach(f => f.style.display = "block");

    return;
  }

  // SEARCH MODE (FOCUS ON GAMES ONLY)
  carousel.style.display = "none";
  featured.style.display = "none";

  games.forEach(g => {
    const name = g.dataset.name.toLowerCase();
    g.style.display = name.includes(val) ? "block" : "none";
  });

  featuredCards.forEach(f => {
    const name = f.dataset.name.toLowerCase();
    f.style.display = name.includes(val) ? "block" : "none";
  });
});


/* =======================
   CAROUSEL SWITCH
======================= */
let i = 0;
const slides = document.querySelectorAll(".slide");

function show() {
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
  i = (i + 1) % slides.length;
}

show();
setInterval(show, 3500);
</script>

</body>
</html>
