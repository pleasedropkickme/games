<!DOCTYPE html>
<html>
<head>
  <title>Carson SMP Games</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    /* TOP RIGHT JOIN BUTTON */
    .join-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      background-color: black;
      color: white;
      border: 2px solid white;
      padding: 10px 16px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      text-decoration: none;
      border-radius: 8px;
      z-index: 9999;
      transition: 0.2s ease;
    }

    .join-btn:hover {
      background-color: white;
      color: black;
    }
  </style>
</head>

<body>

  <!-- JOIN BUTTON (CHANGE LINK HERE) -->
  <a class="join-btn" href="joincarsonsmp.github.io" target="_blank">
    Join the Carson SMP
  </a>

  <header>
    <h1>Carson SMP Games</h1>
    <div class="subtitle">
      Updates daily! Suggest games 
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSe3_sbc6CRZuYDlBWvWJkabXiVyQ70CF6iRISkzowsqB4AxSQ/viewform?usp=sharing&ouid=105447127997926674664" target="_blank">
        here
      </a>!
    </div>
  </header>

  <!-- GAME GRID -->
  <div class="games">

    <div class="game-card" onclick="openGame('https://smapskajendfjshwbekf-prog.github.io/newcargame/')">
      <img src="assets/polytrack.png">
      <div class="game-title">Poly Track</div>
    </div>

    <div class="game-card" onclick="openGame('https://smapskajendfjshwbekf-prog.github.io/eaglercraft/')">
      <img src="assets/eaglercraft.png">
      <div class="game-title">EaglerCraft</div>
    </div>

    <div class="game-card" onclick="openGame('https://pleasedropkickme.github.io/games/games/geometrydash/geometrydash.html')">
      <img src="assets/geometrydash.png">
      <div class="game-title">Geometry Dash Lite</div>
    </div>

    <div class="game-card" onclick="openGame('https://pleasedropkickme.github.io/games/games/driftboss/Drift%20Boss.html')">
      <img src="assets/driftboss.png">
      <div class="game-title">Drift Boss</div>
    </div>

    <div class="game-card" onclick="openGame('https://pleasedropkickme.github.io/games/games/drivemad/Drive%20Mad.html')">
      <img src="assets/drivemad.png">
      <div class="game-title">Drive Mad</div>
    </div>

    <div class="game-card" onclick="openGame('https://pleasedropkickme.github.io/games/games/drivemad2/drivemad2.html')">
      <img src="assets/drive-mad-2.png">
      <div class="game-title">Drive Mad 2</div>
    </div>

    <div class="game-card" onclick="openGame('https://pleasedropkickme.github.io/games/games/smallcup/smallworldcup.html')">
      <img src="assets/asmallworldcup.png">
      <div class="game-title">A Small World Cup</div>
    </div>

    <div class="game-card" onclick="openGame('https://pleasedropkickme.github.io/games/games/crossyroad/crossyroad.html')">
      <img src="assets/crossyroad.png">
      <div class="game-title">Crossy Road</div>
    </div>

    <div class="game-card" onclick="openGame('https://pleasedropkickme.github.io/games/games/escaperoad/escaperoad.html')">
      <img src="assets/escaperoad.png">
      <div class="game-title">Escape Road</div>
    </div>

    <div class="game-card" onclick="openGame('https://pleasedropkickme.github.io/games/games/escaperoad2/escaperoad2.html')">
      <img src="assets/escaperoad2.png">
      <div class="game-title">Eascape Road 2</div>
    </div>

  </div>

  <!-- POPUP -->
  <div id="popup" class="popup">
    <div class="popup-content" id="popupContent">

      <span class="fullscreen-btn" id="fsBtn" onclick="toggleFullscreen()">⛶</span>
      <span class="close-btn" onclick="closeGame()">✖</span>

      <iframe id="gameFrame"></iframe>
    </div>
  </div>

  <script>
    function openGame(url) {
      document.getElementById("popup").style.display = "flex";
      document.getElementById("gameFrame").src = url;
    }

    function closeGame() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("gameFrame").src = "";
      exitFullscreen();
    }

    function toggleFullscreen() {
      const elem = document.getElementById("popupContent");

      if (!document.fullscreenElement) {
        elem.requestFullscreen();
        document.getElementById("fsBtn").textContent = "🡼";
      } else {
        document.exitFullscreen();
        document.getElementById("fsBtn").textContent = "⛶";
      }
    }

    function exitFullscreen() {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
      document.getElementById("fsBtn").textContent = "⛶";
    }

    window.onload = () => {
      document.body.classList.add("loaded");
    };
  </script>

</body>
</html>
