<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carson SMP Games</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
}

iframe {
  width: 100%;
  height: 100vh;
  border: none;
}

.error {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-size: 24px;
}
</style>
</head>

<body>

<iframe id="frame" style="display:none;"></iframe>
<div id="error" class="error" style="display:none;"></div>

<script>
const params = new URLSearchParams(location.search);
const game = params.get("g");

const db = {
  polytrack: "https://smapskajendfjshwbekf-prog.github.io/newcargame/",
  eaglercraft: "https://example.com/game2",
  geometrydashlite: "https://example.com/game3",
  drivemad: "https://example.com/game4",
  asmallworkcup: "https://example.com/game5",
  escaperoad3: "https://example.com/game6",
  game1: "https://example.com/game1",
  game2: "https://example.com/game2",
  game3: "https://example.com/game3",
  game4: "https://example.com/game4"
};

const frame = document.getElementById("frame");
const error = document.getElementById("error");

if (db[game]) {
  frame.src = db[game];
  frame.style.display = "block";
} else {
  error.style.display = "flex";
  error.innerText = "Game not found: " + game;
}
</script>

</body>
</html>
