<script>
/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase().trim();

  const carousel = document.getElementById("carousel");
  const featuredTitle = document.getElementById("featured");
  const featuredGrid = document.querySelector("#featured + .grid"); // <-- THIS is the fix

  const allGamesSection = document.querySelector("#games + .grid");
  const games = allGamesSection.querySelectorAll(".game");

  if (val === "") {
    carousel.style.display = "block";
    featuredTitle.style.display = "block";
    featuredGrid.style.display = "grid"; // show featured again

    games.forEach(g => g.style.display = "block");
    return;
  }

  carousel.style.display = "none";
  featuredTitle.style.display = "none";
  featuredGrid.style.display = "none"; // hide ALL featured games

  games.forEach(g => {
    const name = g.dataset.name.toLowerCase();
    g.style.display = name.includes(val) ? "block" : "none";
  });
});


/* CAROUSEL */
let i = 0;
const slides = document.querySelectorAll(".slide");

function show() {
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
  i = (i + 1) % slides.length;
}

show();
setInterval(show, 4000);
</script>
