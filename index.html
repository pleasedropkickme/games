<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP NAV -->
<div class="topbar">
  <div class="logo">GAME HUB</div>

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="#games">Games</a>
    <a href="#updates">Updates</a>
  </div>
</div>

<!-- CAROUSEL -->
<div class="carousel">

  <a class="slide active" href="play.html?g=game1" data-color="#66c0f4">
    <img src="assets/testimage.png">
    <div class="text">Game One (NEW)</div>
  </a>

  <a class="slide" href="play.html?g=game2" data-color="#ff6b6b">
    <img src="assets/testimage.png">
    <div class="text">Game Two</div>
  </a>

  <a class="slide" href="play.html?g=game3" data-color="#7CFF6B">
    <img src="assets/testimage.png">
    <div class="text">Game Three</div>
  </a>

</div>

<!-- GAMES -->
<div id="games" class="section-title">Featured Games</div>

<div class="grid">

  <a class="game" href="play.html?g=game1" data-name="Game One">
    <img src="assets/testimage.png">
    <div>Game One (NEW)</div>
  </a>

  <a class="game" href="play.html?g=game2" data-name="Game Two">
    <img src="assets/testimage.png">
    <div>Game Two</div>
  </a>

  <a class="game" href="play.html?g=game3" data-name="Game Three">
    <img src="assets/testimage.png">
    <div>Game Three</div>
  </a>

  <a class="game" href="play.html?g=game4" data-name="Game Four">
    <img src="assets/testimage.png">
    <div>Game Four</div>
  </a>

</div>

<!-- UPDATES -->
<div id="updates" class="section-title">Updates</div>
<div class="updates">
  New games are being added regularly. Stay tuned.
</div>

<script>
/* CAROUSEL FADE */
let i = 0;
const slides = document.querySelectorAll(".slide");

function show() {
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
  i = (i + 1) % slides.length;
}
show();
setInterval(show, 4000);

/* SEARCH (optional future use) */
</script>

</body>
</html>
