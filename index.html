<!DOCTYPE html>
<html>
<head>
  <title>Carson SMP Games</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Carson SMP Games</h1>
    <div class="subtitle">By Dankle and Really Cool Guy</div>
  </header>

  <!-- GAME GRID -->
  <div class="games">

    <div class="game-card" onclick="openGame('https://example.com')">
      <img src="https://via.placeholder.com/300x140">
      <div class="game-title">Game 1</div>
    </div>

    <div class="game-card" onclick="openGame('https://example.com')">
      <img src="https://via.placeholder.com/300x140">
      <div class="game-title">Game 2</div>
    </div>

    <div class="game-card" onclick="openGame('https://example.com')">
      <img src="https://via.placeholder.com/300x140">
      <div class="game-title">Game 3</div>
    </div>

    <div class="game-card" onclick="openGame('https://example.com')">
      <img src="https://via.placeholder.com/300x140">
      <div class="game-title">Game 4</div>
    </div>

  </div>

  <!-- POPUP -->
  <div id="popup" class="popup">
    <div class="popup-content" id="popupContent">

      <span class="fullscreen-btn" id="fsBtn" onclick="toggleFullscreen()">⛶</span>
      <span class="close-btn" onclick="closeGame()">✖</span>

      <iframe id="gameFrame"></iframe>
    </div>
  </div>

  <script>
    function openGame(url) {
      document.getElementById("popup").style.display = "flex";
      document.getElementById("gameFrame").src = url;
    }

    function closeGame() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("gameFrame").src = "";
      exitFullscreen();
    }

    function toggleFullscreen() {
      const elem = document.getElementById("popupContent");

      if (!document.fullscreenElement) {
        elem.requestFullscreen();
        document.getElementById("fsBtn").textContent = "🡼";
      } else {
        document.exitFullscreen();
        document.getElementById("fsBtn").textContent = "⛶";
      }
    }

    function exitFullscreen() {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
      document.getElementById("fsBtn").textContent = "⛶";
    }

    window.onload = () => {
      document.body.classList.add("loaded");
    };
  </script>

</body>
</html>
