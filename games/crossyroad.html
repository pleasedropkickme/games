<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/assets@main/basketball-stars/">
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no">

    <title>Basketball Stars</title>

    <link rel="stylesheet" href="assets/css/app.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L7856P3VNT"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-L7856P3VNT');
    </script>

    <style>
        #sidebarad1, #sidebarad2 {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 160px;
            height: 600px;
            z-index: 999999;
        }
        #sidebarad1 { left: 0; }
        #sidebarad2 { right: 0; }

        .sidebar-close {
            position: absolute;
            top: 0;
            right: 0;
            width: 22px;
            height: 22px;
            line-height: 22px;
            text-align: center;
            background: rgba(0,0,0,0.7);
            color: #fff;
            cursor: pointer;
        }

        .sidebar-frame {
            width: 160px;
            height: 600px;
            border: none;
        }
    </style>
</head>

<body>
    <div id="content"></div>
    <div id="orientation"></div>
    <div id="loader">Loading ...</div>

    <!-- Scripts -->
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    <script src="assets/box2dweb/nape.min.js"></script>
    <script src="assets/box2dweb/nape-debug-draw.min.js"></script>
    <script src="assets/box2dweb/jquery-3.1.1.min.js"></script>
    <script src="assets/box2dweb/easeljs-0.8.2.combined.js"></script>
    <script src="assets/box2dweb/bluebird.min.js"></script>

    <script>
        var useEvents = typeof Event === "function";

        function myDispatchEvent(name) {
            var event = useEvents ? new Event(name) : document.createEvent("Event");
            if (!useEvents) event.initEvent(name, true, true);
            document.getElementById("content").dispatchEvent(event);
        }

        window.GD_OPTIONS = {
            gameId: "69d78d071f704fa183d75b4114ae40ec",
            onEvent: function (event) {
                switch (event.name) {
                    case "SDK_GAME_START":
                        myDispatchEvent("SDK_GAME_START");
                        break;
                    case "SDK_GAME_PAUSE":
                        myDispatchEvent("SDK_GAME_PAUSE");
                        break;
                    case "SDK_READY":
                        console.log("SDK_READY");
                        break;
                }
            }
        };

        (function (d, s, id) {
            if (d.getElementById(id)) return;
            var js = d.createElement(s);
            js.id = id;
            js.src = "assets/main.min.js";
            d.getElementsByTagName(s)[0].parentNode.insertBefore(js, null);
        })(document, "script", "gamedistribution-jssdk");
    </script>

    <script src="assets/basketball_legends_2019.min.js"></script>

    <!-- Sidebar Ads -->
    <div id="sidebarad1">
        <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
    </div>

    <div id="sidebarad2">
        <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
    </div>
</body>
</html>
