<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Games</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<!-- TOP BAR (same as main site) -->
<div class="topbar">

  <div class="left">
    <div class="logo">CARSON SMP GAMES</div>

    <div class="nav">
      <a href="/allgames/index.html">ALL GAMES</a>
      <a href="/recents/index.html">RECENTS</a>
      <a href="/updates/index.html">UPDATES</a>
    </div>

  </div>

  <div class="right">
    <input id="search" placeholder="Search games...">
  </div>

</div>

<!-- TITLE -->
<div class="section-title">All Games</div>

<!-- GAMES GRID (PLACEHOLDER ONLY) -->
<div class="grid">

  <!-- PLACEHOLDER GAME CARD -->
  <a class="game" href="#">
    <img src="../assets/placeholder.png" alt="Game">
    <div>Game Name</div>
  </a>

  <a class="game" href="#">
    <img src="../assets/placeholder.png" alt="Game">
    <div>Game Name</div>
  </a>

  <a class="game" href="#">
    <img src="../assets/placeholder.png" alt="Game">
    <div>Game Name</div>
  </a>

  <a class="game" href="#">
    <img src="../assets/placeholder.png" alt="Game">
    <div>Game Name</div>
  </a>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const search = params.get("search");

if (search) {
  const val = search.toLowerCase();

  const games = document.querySelectorAll(".game");

  games.forEach(g => {
    const name = g.innerText.toLowerCase();
    g.style.display = name.includes(val) ? "block" : "none";
  });

  // also pre-fill search box
  const input = document.getElementById("search");
  if (input) input.value = search;
}
</script>

</body>
</html>
